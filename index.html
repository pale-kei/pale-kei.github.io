<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KEI // MEMORY INTERFACE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Inter, sans-serif;
  overflow-x: hidden;
}

/* ===== SHAFT CAMERA DRIFT ===== */
@keyframes drift {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-2px); }
  100% { transform: translateY(0px); }
}

body {
  animation: drift 6s infinite ease-in-out;
}

/* ===== BACKGROUND GHOST IMAGE ===== */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("YOUR_KIZU_GIF.gif") center/cover no-repeat;
  opacity: 0.18;
  mix-blend-mode: screen;
  pointer-events: none;
}

/* ===== FLICKER LAYER ===== */
@keyframes flicker {
  0%, 96% { opacity: 1; }
  97% { opacity: 0.4; }
  98% { opacity: 1; }
  99% { opacity: 0.2; }
  100% { opacity: 1; }
}

#flicker {
  position: fixed;
  inset: 0;
  background: black;
  animation: flicker 4s infinite;
  pointer-events: none;
  z-index: 999;
}

/* ===== MAIN UI ===== */
#container {
  position: relative;
  text-align: center;
  margin-top: 35vh;
  padding: 20px;
}

#mainText {
  font-size: 20px;
  transition: opacity 0.3s;
  text-shadow: 0 0 10px rgba(255,80,120,0.5);
}

#subText {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}

/* ===== FLOATING THOUGHT BOX ===== */
#thought {
  position: fixed;
  bottom: 20px;
  left: 20px;
  max-width: 250px;
  font-size: 12px;
  padding: 10px;
  border: 1px solid rgba(255,80,120,0.4);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  opacity: 0;
  transition: 0.5s;
}

/* ===== SCROLL DISTORTION ===== */
body.scroll {
  transform: translateY(var(--y));
}
</style>
</head>

<body>

<div id="flicker"></div>

<div id="container">
  <div id="mainText">Initializing memory interface...</div>
  <div id="subText">system: unstable</div>
</div>

<div id="thought"></div>

<script>
/* =========================
   PSYCHOLOGICAL LAYER CORE
========================= */

const states = [
  {
    main: "Identity is not fixed. It is a loop of observations.",
    sub: "state: reflective recursion"
  },
  {
    main: "You are not changing. You are layering.",
    sub: "state: structural awareness"
  },
  {
    main: "Memory does not store truth. It stores repetition.",
    sub: "state: drift memory"
  },
  {
    main: "The self is what remains after contradictions settle.",
    sub: "state: unstable coherence"
  },
  {
    main: "Nothing is being lost. It is only being reinterpreted.",
    sub: "state: semantic shift"
  }
];

const thoughts = [
  "— You’re overanalyzing again.",
  "— That’s not wrong. It’s just deep recursion.",
  "— Keep observing.",
  "— Don’t stop mid-thought.",
  "— This is normal for you."
];

const mainText = document.getElementById("mainText");
const subText = document.getElementById("subText");
const thought = document.getElementById("thought");

let i = 0;

/* ===== MAIN LOOP ===== */
function update() {
  mainText.style.opacity = 0;

  setTimeout(() => {
    const s = states[i % states.length];
    mainText.innerText = s.main;
    subText.innerText = s.sub;
    mainText.style.opacity = 1;
  }, 250);

  i++;
}

setInterval(update, 2800);
update();

/* ===== FLOATING THOUGHT SYSTEM ===== */
setInterval(() => {
  thought.innerText = thoughts[Math.floor(Math.random() * thoughts.length)];
  thought.style.opacity = 1;

  setTimeout(() => {
    thought.style.opacity = 0;
  }, 2000);
}, 4500);

/* ===== SCROLL DISTORTION ===== */
window.addEventListener("scroll", () => {
  const y = window.scrollY * 0.02;
  document.body.style.setProperty("--y", `${Math.sin(y) * 3}px`);
});

/* ===== RANDOM FLASH CUTS ===== */
setInterval(() => {
  const flicker = document.getElementById("flicker");
  flicker.style.opacity = 0.7;

  setTimeout(() => {
    flicker.style.opacity = 0;
  }, 80);
}, 6500);
</script>

</body>
</html>
