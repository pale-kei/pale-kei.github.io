<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KEI // Interface</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Inter, sans-serif;
  overflow-x: hidden;
}

/* subtle animated drift (VERY light) */
@keyframes drift {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-1px); }
  100% { transform: translateY(0px); }
}

body {
  animation: drift 8s infinite ease-in-out;
}

/* background image (low opacity, stable) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("YOUR_KIZU_GIF.gif") center/cover no-repeat;
  opacity: 0.12;
  pointer-events: none;
}

/* main container */
#container {
  position: relative;
  text-align: center;
  margin-top: 35vh;
  padding: 20px;
}

/* main text */
#mainText {
  font-size: 20px;
  transition: opacity 0.4s ease;
  text-shadow: 0 0 10px rgba(255,80,120,0.4);
}

/* sub text */
#subText {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}

/* floating thought box */
#thought {
  position: fixed;
  bottom: 20px;
  left: 20px;
  max-width: 240px;
  font-size: 12px;
  padding: 10px;
  border: 1px solid rgba(255,80,120,0.35);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* very rare micro-flash (NOT full screen) */
.flash {
  animation: flash 0.15s ease;
}

@keyframes flash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2); }
  100% { filter: brightness(1); }
}
</style>
</head>

<body>

<div id="container">
  <div id="mainText">Loading interface...</div>
  <div id="subText">system stable</div>
</div>

<div id="thought"></div>

<script>
const states = [
  {
    main: "Identity is not fixed. It is interpreted over time.",
    sub: "state: reflective"
  },
  {
    main: "Memory changes every time it is recalled.",
    sub: "state: drift"
  },
  {
    main: "You are not becoming someone else. You are updating.",
    sub: "state: continuity"
  },
  {
    main: "Contradiction is part of structure.",
    sub: "state: coherence"
  },
  {
    main: "Nothing disappears. It only reorganizes.",
    sub: "state: persistence"
  }
];

const thoughts = [
  "— still thinking.",
  "— continue.",
  "— you’re fine.",
  "— observe it, don’t fight it.",
  "— it passes through."
];

let i = 0;

const mainText = document.getElementById("mainText");
const subText = document.getElementById("subText");
const thought = document.getElementById("thought");

function updateMain() {
  mainText.style.opacity = 0;

  setTimeout(() => {
    const s = states[i % states.length];
    mainText.innerText = s.main;
    subText.innerText = s.sub;
    mainText.style.opacity = 1;
  }, 300);

  i++;
}

setInterval(updateMain, 3500);
updateMain();

/* floating thought system */
setInterval(() => {
  thought.innerText = thoughts[Math.floor(Math.random() * thoughts.length)];
  thought.style.opacity = 1;

  setTimeout(() => {
    thought.style.opacity = 0;
  }, 2200);
}, 5000);

/* VERY subtle occasional flash */
setInterval(() => {
  document.body.classList.add("flash");
  setTimeout(() => {
    document.body.classList.remove("flash");
  }, 150);
}, 9000);
</script>

</body>
</html>
