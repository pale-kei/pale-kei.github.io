<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEI // INTERFACE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  background: black;
  color: white;
  font-family: Inter, sans-serif;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url("YOUR_GIF.gif") center/cover no-repeat;
  opacity: 0.12;
  filter: brightness(0.7);
  z-index: -2;
}

/* VIGNETTE */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, black 100%);
  z-index: -1;
}

/* CONTAINER */
.container {
  max-width: 720px;
  margin: auto;
  padding: 20px;
}

/* TITLE */
.title {
  text-align: center;
  margin-top: 40px;
  font-size: 24px;
  letter-spacing: 2px;
  transition: 0.2s;
}

/* SHAFT GLITCH PULSE */
.glitch {
  animation: glitch 0.15s;
}

@keyframes glitch {
  0% { transform: translateX(0); }
  50% { transform: translateX(2px); }
  100% { transform: translateX(0); }
}

/* CARDS */
.card {
  margin-top: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,80,120,0.2);
  backdrop-filter: blur(6px);
}

/* MAIN QUOTE DISPLAY */
#quoteMain {
  font-size: 16px;
  margin-top: 30px;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(8px);
  transition: 0.5s;
}

#quoteMain.show {
  opacity: 1;
  transform: translateY(0);
}

#quoteSpeaker {
  font-size: 12px;
  opacity: 0;
  margin-top: 10px;
  transition: 0.5s;
}

#quoteSpeaker.show {
  opacity: 0.6;
}

/* FLASH CUT */
.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
}

.flash.active {
  animation: flash 0.08s;
}

@keyframes flash {
  0% { opacity: 0.7; }
  100% { opacity: 0; }
}

/* STATUS */
.status {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 10px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="vignette"></div>
<div class="flash" id="flash"></div>

<div class="container">

<div class="title" id="title">KEI // MEMORY INTERFACE</div>

<div class="card">
<b>Oliver / Kei — 16</b><br><br>
Published author. National awards.<br>
Psychological + systems-focused thinking.<br>
Autistic + ADHD.
</div>

<div class="card">
<b>LIVE MEMORY STREAM</b>

<div id="quoteMain"></div>
<div id="quoteSpeaker"></div>

</div>

</div>

<div class="status" id="status">NODE ACTIVE</div>

<script>
const quotes = [
  {text:"If there is a meeting… there will be a farewell.", speaker:"Shinobu Oshino"},
  {text:"Averting your eyes isn’t running away.", speaker:"Tsubasa Hanekawa"},
  {text:"Not trying to be happy is cowardice.", speaker:"Ougi Oshino"},
  {text:"No one can replace someone else.", speaker:"Suruga Kanbaru"},
  {text:"Romance makes people stronger… or useless.", speaker:"Hitagi Senjougahara"},
  {text:"No matter what happens… it’s still you.", speaker:"Tsubasa Hanekawa"},
  {text:"Kindness can be selfish.", speaker:"Koyomi Araragi"},
  {text:"People don’t change. They reveal.", speaker:"Deishuu Kaiki"},
  {text:"You chose that outcome.", speaker:"Ougi Oshino"},
  {text:"Some wounds never heal.", speaker:"Deishuu Kaiki"}
];

let i = 0;

const main = document.getElementById("quoteMain");
const speaker = document.getElementById("quoteSpeaker");
const flash = document.getElementById("flash");
const title = document.getElementById("title");

function nextQuote() {
  main.classList.remove("show");
  speaker.classList.remove("show");

  setTimeout(() => {
    const q = quotes[i];

    main.innerText = `"${q.text}"`;
    speaker.innerText = "— " + q.speaker;

    main.classList.add("show");

    setTimeout(() => {
      speaker.classList.add("show");
    }, 400);

    i = (i + 1) % quotes.length;
  }, 300);

  /* shaft flash cut */
  flash.classList.add("active");
  setTimeout(() => flash.classList.remove("active"), 80);

  /* rare title glitch */
  if (Math.random() < 0.3) {
    title.classList.add("glitch");
    setTimeout(() => title.classList.remove("glitch"), 150);
  }
}

setInterval(nextQuote, 3500);
nextQuote();

/* status rotation */
const states = ["NODE ACTIVE", "OBSERVING", "STABLE", "SYNCHRONIZED"];

setInterval(() => {
  document.getElementById("status").innerText =
    states[Math.floor(Math.random() * states.length)];
}, 4000);
</script>

</body>
</html>
